modLoader="javafml"
loaderVersion="[47,)"
license="All Rights Reserved"
issueTrackerURL=""

# Durability scaling mixin (apostasy scars / Aurex blessings). All gameplay logic lives in
# com.otectus.spells_n_gods.durability; the mixin only scales ItemStack.hurt's damage amount.
[[mixins]]
config="spells_n_gods.mixins.json"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Otectus"
description='''
Spells n' Gods: a datapack-first divine framework.
'''

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="[${forge_version},48)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="[${minecraft_version},)"
ordering="NONE"
side="BOTH"

# Required: GeckoLib for boss entity animations
[[dependencies.${mod_id}]]
modId="geckolib"
mandatory=true
versionRange="[4.7,5.0)"
ordering="AFTER"
side="BOTH"

# Optional mod integrations - accept any version since these mods use
# inconsistent version formats (e.g. "1.20.1-3.15.3" for irons_spellbooks).
# Actual compat is guarded by ModList.isLoaded() checks at runtime.
[[dependencies.${mod_id}]]
modId="jade"
mandatory=false
versionRange="[0,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="curios"
mandatory=false
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

